<!DOCTYPE html>
<html lang="en">

<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <title>TAPIS: Tables from APIs for Sensors (Sensor Things API plus Explorer)</title>
    <link rel="icon" type="image/x-icon" href="../favicon.ico">


    <link rel="stylesheet" href="documentation.css">
    <script type="text/javascript" src="../t_nodes.js" defer></script>
    <script type="text/javascript" src="documentation.js" defer></script>

</head>

<body onLoad="openToolPage('statisticsVisualize')">
    <header class="descriptionToolsHeader" id="toolPage_header_statisticsVisualize">
    </header>
    <main>
        <h1 class="toolPage_mainTitle">Table tools for statistics and visualization</h1> <!--general title -->
        <div id="toolPage_statisticsVisualize" class="toolBoxParent"></div> <!--all tools-->

        <div class="toolPage_main" id="general"> <!--general explanation-->
            <div class="toolPage_main_text">
                General Explanation
                <!-- <img src="STAplusService_image1.png" alt="icon" class="toolPage_image" > -->
            </div>
        </div>

        <div class="toolPage_main" id="ColumnStatistics">
            <div class="toolPage_main_text">
                <h2 class="toolPage_title"><img src="../ColumnStatistics.png" alt="icon ColumnStatistics"
                        class="toolPage_title_icon">Columns statistics
                </h2>
                <!-- <img src="STAplusService_image1.png" alt="icon" class="toolPage_image" > -->
            </div>
        </div>
        <div class="toolPage_main" id="ScatterPlot">
            <div class="toolPage_main_text">
                <h2 class="toolPage_title"><img src="../ScatterPlot.png" alt="icon ScatterPlot"
                        class="toolPage_title_icon">Scatter Plot
                </h2>
                <!-- <img src="STAplusService_image1.png" alt="icon" class="toolPage_image" > -->
            </div>
        </div>
        <div class="toolPage_main" id="BarPlot">
            <div class="toolPage_main_text">
                <h2 class="toolPage_title"><img src="../BarPlot.png" alt="icon BarPlot" class="toolPage_title_icon">Bar
                    Plot
                </h2>
                <!-- <img src="STAplusService_image1.png" alt="icon" class="toolPage_image" > -->
            </div>
        </div>
        <div class="toolPage_main" id="ImageViewer">
            <div class="toolPage_main_text">
                <h2 class="toolPage_title"><img src="../ImageViewer.png" alt="icon ImageViewer"
                        class="toolPage_title_icon">Image Viewer
                </h2>
                <!-- <img src="STAplusService_image1.png" alt="icon" class="toolPage_image" > -->
            </div>
        </div>
        <div class="toolPage_main" id="OpenMap">
            <div class="toolPage_main_text">
                <h2 class="toolPage_title"><img src="../OpenMap.png" alt="icon OpenMap" class="toolPage_title_icon">Open
                    Map
                </h2>
                <!-- <img src="STAplusService_image1.png" alt="icon" class="toolPage_image" > -->
            </div>
        </div>


    </main>
</body>

</html>
